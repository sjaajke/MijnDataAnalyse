name: Build MijnDataAnalyse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # macOS
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies installeren
        run: flutter pub get

      - name: Code signing uitschakelen (CI)
        run: |
          cd macos
          sed -i '' \
            's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' \
            Runner.xcodeproj/project.pbxproj
          sed -i '' \
            '/CODE_SIGN_STYLE/d' \
            Runner.xcodeproj/project.pbxproj

      - name: Build macOS
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: flutter build macos --release

      - name: App inpakken als zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r MijnDataAnalyse-macOS.zip mijn_data_analyse.app

      - uses: actions/upload-artifact@v4
        with:
          name: MijnDataAnalyse-macOS
          path: build/macos/Build/Products/Release/MijnDataAnalyse-macOS.zip
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Windows
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Windows platform toevoegen
        run: flutter create --platforms=windows .

      - name: Dependencies installeren
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Artifacts inpakken
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath MijnDataAnalyse-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MijnDataAnalyse-Windows
          path: MijnDataAnalyse-Windows.zip
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Android
  # ────────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Android platform toevoegen
        run: flutter create --platforms=android .

      - name: Dependencies installeren
        run: flutter pub get

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: MijnDataAnalyse-Android
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
